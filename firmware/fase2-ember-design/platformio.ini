; PineCYD - Pinecil dashboard for the ESP32 CYD, direct BLE (no HA/IronOS integration).
; Design (screen P2, "Ember" theme) originally made for a separate private project's own
; design-handoff doc, ported to raw LVGL C++ - the implementation is rewritten
; (ESPHome/LVGL-YAML -> raw LVGL), the design itself is not, except where flagged. Pinout/
; color-order/rotation below were confirmed on real hardware - see README.md for the full
; history, including what's a faithful port vs. a flagged simplification.

[env:esp32dev]
; Pinned to the pioarduino fork, not the official platformio-espressif32 registry entry -
; discovered 2026-07-13 when a CI build with a bare "platform = espressif32" silently
; resolved a completely different, much older platform (7.0.1 / arduino-esp32 core
; 3.20017.241212) than every real-hardware test in this project's history actually ran on
; (this fork, 55.3.39 / core 3.3.9) - and, concretely, didn't auto-produce the merged
; firmware.factory.bin release asset the way this exact version does. Pin kept in sync with
; whatever's been flashed to real hardware; bump deliberately, not by omission.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
; Adding WiFi (2026-07-13, for the NTP clock) pushed the image past the default 1.31MB
; app-partition limit (~1.51MB needed) - WiFi's stack (lwIP, WPA supplicant, mbedTLS) added
; ~577KB alone. Switched to a single 3MB app partition since this project needs neither
; OTA updates nor a filesystem (spiffs) - huge_app.csv trades those away for app space.
board_build.partitions = huge_app.csv
lib_deps =
    h2zero/NimBLE-Arduino @ ^2.5.0
    bodmer/TFT_eSPI @ ^2.5.33
    lvgl/lvgl @ ^8.3.11
    ; Captive-portal WiFi config (2026-07-13), replacing compile-time secrets.h credentials -
    ; lets a single prebuilt release binary work for anyone, instead of requiring each user to
    ; rebuild with their own WiFi credentials baked in. See README.md for the setup flow.
    tzapu/WiFiManager @ ^2.0.17
build_flags =
    -D CORE_DEBUG_LEVEL=3
    ; --- TFT_eSPI board config (Sunton ESP32-2432S028R, confirmed via a separate private
    ; project's already-verified ESPHome hardware config for this same board) ---
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    ; Confirmed on real hardware (2026-07-12): this panel is landscape-native at
    ; rotation 0, not portrait+rotate90 like a "typical" TFT_eSPI ILI9341 setup - matches
    ; the other project's own approach of never using a 90 rotation, only mirror transforms.
    ; Declaring it as 240x320 and rotating 90 in software produced a scrambled/portrait
    ; image; swapping these two fixed it.
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=240
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    ; That other project found this panel variant needs explicit RGB order on real hardware
    ; (ILI9341's usual default is BGR) - confirmed correct here too, 2026-07-12.
    -D TFT_RGB_ORDER=TFT_RGB
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    ; lv_conf.h lives in include/. PlatformIO's chain LDF does not propagate the
    ; project's include/ dir to library compilation units, so LV_CONF_INCLUDE_SIMPLE
    ; alone leaves lvgl's own .c files unable to find "lv_conf.h" - point at it with an
    ; explicit absolute path instead (confirmed necessary by a failed build otherwise).
    -D LV_CONF_PATH=${PROJECT_DIR}/include/lv_conf.h
    ; Needed for src/fonts/lv_font_montserrat_72_digits.c (a custom lv_font_conv-generated
    ; font, digits+hyphen only, for the enlarged tip-temp hero value - built-in Montserrat
    ; only goes up to 48px). Without this it falls back to #include "lvgl/lvgl.h", which
    ; doesn't resolve against this project's include paths.
    -D LV_LVGL_H_INCLUDE_SIMPLE=1
